<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build a Cash Register Project - freeCodeCamp</title>
  <link rel="icon" type="image/x-icon" href="./cash-register.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <img class="freecodecamp-logo" src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg" alt="freeCodeCamp Logo">

  <h1>Cash Register Project</h1>

  <div id="change-due-container">
    <p id="change-due"></p>
  </div>

  <label for="cash">Enter cash from customer:</label>
  <input type="number" id="cash" />
  <button type="button" id="purchase-btn">Purchase</button>

  <p class="total">Total: $<span id="price-element"></span></p>

  <div class="square"></div>

  <div class="cash-register-housing">

    <div class="button-numbers">
      <div class="number-1"></div>
      <div class="number-2"></div>
      <div class="number-3"></div>
      <div class="number-4"></div>
      <div class="number-5"></div>
      <div class="number-6"></div>
      <div class="number-7"></div>
      <div class="number-8"></div>
      <div class="number-9"></div>
    </div>

    <div class="screen">
      <span class="bold">Change in drawer:</span>
      <div id="cash-drawer">

      </div>
    </div>
  </div>

  <div class="cash-drawer">
    <div class="lock"></div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
